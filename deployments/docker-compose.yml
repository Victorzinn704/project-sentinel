services:
  sentinel:
    image: project-sentinel:latest
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: sentinel
    env_file:
      - ../.env
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 256M
    ports:
      - "8080:8080"
    volumes:
      - ../sessions:/data/sessions
    environment:
      SESSION_STORE_PATH: /data/sessions
      STATE_DB_PATH: /data/sessions/state.db
      MODELS_CONFIG_PATH: /app/configs/models.json
    restart: unless-stopped
